name: LinuxCI - Auto Build Kernel

on:
  push:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động lúc 00:00 UTC mỗi ngày
  workflow_dispatch:     # Cho phép bấm nút trigger thủ công bất cứ lúc nào

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - name: Check Latest Stable Kernel Version
        id: kernel_ver
        run: |
          LATEST=$(curl -s https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
          echo "LATEST_VER=$LATEST" >> $GITHUB_ENV
          echo "Latest stable kernel on kernel.org: $LATEST"
          
          # Check xem tag đã build trên Repo chưa
          EXISTS=$(git ls-remote --tags origin "refs/tags/v$LATEST" | wc -l)
          if [ "$EXISTS" -gt "0" ]; then
            echo "Version v$LATEST already built. Exiting..."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Install Build Dependencies
        if: env.SKIP == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev bc ccache dwarves kmod cpio rsync

      - name: Download & Extract Kernel Source
        if: env.SKIP == 'false'
        run: |
          MAJOR=$(echo ${{ env.LATEST_VER }} | cut -d. -f1)
          wget https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${{ env.LATEST_VER }}.tar.xz
          tar -xf linux-${{ env.LATEST_VER }}.tar.xz

      - name: Fetch Arch Config & Optimize
        if: env.SKIP == 'false'
        run: |
          cd linux-${{ env.LATEST_VER }}
          
          # Pull .config xịn của Arch Linux
          curl -sSL https://gitlab.archlinux.org/archlinux/packaging/packages/linux/-/raw/main/config.x86_64\?ref_type\=heads\&inline\=false -o .config
          
          # Tắt Debug & Certs để build nhanh + không bị crash ngang
          scripts/config --disable DEBUG_INFO
          scripts/config --disable DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          scripts/config --disable DEBUG_INFO_BTF
          scripts/config --set-str SYSTEM_TRUSTED_KEYS ""
          scripts/config --set-str SYSTEM_REVOCATION_KEYS ""
          
          # Tự động điền default cho các config mới
          make olddefconfig

      - name: Compile Kernel & Package Raw Binaries
        if: env.SKIP == 'false'
        run: |
          cd linux-${{ env.LATEST_VER }}
          
          # Build vmlinuz và modules bằng toàn bộ CPU cores
          make -j$(nproc) bzImage modules
          
          # Gom hàng vào thư mục dist để đóng gói
          mkdir -p ../dist/boot
          
          # 1. Copy bzImage, System.map và .config
          cp arch/x86/boot/bzImage ../dist/boot/vmlinuz-${{ env.LATEST_VER }}-linuxci
          cp System.map ../dist/boot/System.map-${{ env.LATEST_VER }}-linuxci
          cp .config ../dist/boot/config-${{ env.LATEST_VER }}-linuxci
          
          # 2. Install modules vào thư mục tạm rồi nén lại
          make modules_install INSTALL_MOD_PATH=../dist
          
          # 3. Nén modules bằng tar.xz (nén cực sâu, xài xz)
          cd ../dist
          tar -cJf ../modules-${{ env.LATEST_VER }}-linuxci.tar.xz lib/modules
          
          # 4. Đổi tên bzImage ra ngoài root để upload
          cd ..
          cp dist/boot/vmlinuz-${{ env.LATEST_VER }}-linuxci ./bzImage-${{ env.LATEST_VER }}

      - name: Generate Checksums
        if: env.SKIP == 'false'
        run: |
          sha256sum bzImage-${{ env.LATEST_VER }} modules-${{ env.LATEST_VER }}-linuxci.tar.xz > SHA256SUMS

      - name: Create GitHub Release
        if: env.SKIP == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.LATEST_VER }}
          name: Linux Kernel ${{ env.LATEST_VER }} (Generic Raw Binaries)
          body: |
            Raw Mainline Kernel Build v${{ env.LATEST_VER }} (Arch Config Base).
            
            **Included Files:**
            - `bzImage-${{ env.LATEST_VER }}`: Kernel Image (rename/copy to `/boot/vmlinuz-...`)
            - `modules-${{ env.LATEST_VER }}-linuxci.tar.xz`: Kernel Modules (extract to `/`)
            
            **SHA256 Checksums:**
            ```
            $(cat SHA256SUMS)
            ```
          files: |
            bzImage-${{ env.LATEST_VER }}
            modules-${{ env.LATEST_VER }}-linuxci.tar.xz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}